services:
  app:
    build: .
    image: banxico-sim:latest
    expose:
      - "8000"
    environment:
      PROVIDER: ${PROVIDER:-openrouter}
      MODEL: ${MODEL:-anthropic/claude-sonnet-4.6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET in .env (openssl rand -hex 32)}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS:-720}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://banxico.dlf-no.com}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
